[build-system]
build-backend = "setuptools.build_meta"
requires = [
  "setuptools",
]

[project]
name = "query-exporter"
description = "Export Prometheus metrics generated from SQL queries"
readme = { file = "README.rst", content-type = "text/x-rst" }
keywords = [
  "exporter",
  "metric",
  "prometheus",
  "sql",
]
license = "GPL-3.0-OR-later"
license-files = [ "LICENSE.txt" ]
maintainers = [
  { name = "Alberto Donato", email = "alberto@albertodonato.net" },
]
authors = [
  { name = "Alberto Donato", email = "alberto@albertodonato.net" },
]
requires-python = ">=3.11"
classifiers = [
  "Development Status :: 5 - Production/Stable",
  "Framework :: AsyncIO",
  "Intended Audience :: System Administrators",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Topic :: Database",
  "Topic :: System :: Monitoring",
  "Topic :: Utilities",
]
dynamic = [
  "version",
]
dependencies = [
  "aiohttp",
  "apscheduler",
  "prometheus-aioexporter>=3.1",
  "prometheus-client",
  "pydantic",
  "pyyaml",
  "sqlalchemy>=2",
  "structlog",
]
urls."Issue Tracker" = "https://github.com/albertodonato/query-exporter/issues"
urls."Release Notes" = "https://github.com/albertodonato/query-exporter/blob/main/CHANGES.rst"
urls."Source Code" = "https://github.com/albertodonato/query-exporter"
urls.Changelog = "https://github.com/albertodonato/query-exporter/blob/main/CHANGES.rst"
urls.Documentation = "https://github.com/albertodonato/query-exporter"
urls.Homepage = "https://github.com/albertodonato/query-exporter"
scripts.query-exporter = "query_exporter.main:script"

[dependency-groups]
dev = [
  "mypy",
  "pytest",
  "pytest-cov",
]
docker-dbs = [
  "clickhouse-sqlalchemy",
  "ibm-db-sa; platform_machine=='x86_64'",
  "mysqlclient",
  "oracledb",
  "psycopg2",
  "pymssql",
  "teradatasqlalchemy",
]
integration-tests = [
  "pytest",
  "pytest-asyncio",
  "pytest-docker",
  "requests",
  { include-group = "integration-tests-dbs" }
]
integration-tests-dbs = [
  "mysqlclient",
  "oracledb",
  "psycopg2-binary",
  "pymssql",
]
tests = [
  "pytest-asyncio",
  "pytest-mock",
  "pytest-structlog",
  "time-machine",
]
types = [
  "types-python-dateutil",
  "types-pyyaml",
  "types-requests",
]

[tool.setuptools]
dynamic.version = { attr = "query_exporter.__version__" }
package-data.query_exporter = [ "py.typed" ]
packages.find.include = [ "query_exporter*" ]

[tool.ruff]
line-length = 79
lint.select = [ "F", "I", "RUF", "UP" ]
lint.isort.combine-as-imports = true
lint.isort.force-sort-within-sections = true

[tool.pytest]
ini_options.asyncio_mode = "auto"
ini_options.asyncio_default_fixture_loop_scope = "function"
ini_options.markers = [
  "database_only: only run test on specified database(s)",
  "database_exclude: don't run test on specified database(s)",
]
ini_options.testpaths = [
  "tests",
]

[tool.coverage]
run.source = [ "query_exporter" ]
report.fail_under = 100.0
report.show_missing = true
report.skip_covered = true

[tool.mypy]
ignore_missing_imports = true
strict = true
