name: Docker image

on:
  push:
    branches:
      - main
      - next
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  build-base:
    name: Build base image
    if: github.actor == github.repository_owner
    uses: albertodonato/github-workflows/.github/workflows/docker-build-publish.yaml@2f91268eb6ce8e14f52a69e1925bab45d3e240c2 # v0.0.6
    with:
      image-name: ${{ github.repository }}
      suffix: base
      target: base
      dockerhub-image-name: query-exporter
      dockerhub-username: ${{ vars.DOCKERHUB_USERNAME }}
      platforms: linux/amd64,linux/arm64
    secrets: inherit

  build-full:
    name: Build full image
    if: github.actor == github.repository_owner
    uses: albertodonato/github-workflows/.github/workflows/docker-build-publish.yaml@2f91268eb6ce8e14f52a69e1925bab45d3e240c2 # v0.0.6
    needs:
      - build-base
    with:
      image-name: ${{ github.repository }}
      target: full
      dockerhub-image-name: query-exporter
      dockerhub-username: ${{ vars.DOCKERHUB_USERNAME }}
      platforms: linux/amd64,linux/arm64
    secrets: inherit
