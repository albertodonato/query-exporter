name: Docker image

on:
  push:
    branches:
      - main
      - next
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  build-base:
    name: Build base image
    if: github.actor == github.repository_owner
    uses: albertodonato/github-workflows/.github/workflows/docker-build-publish.yaml@db4826b991f4a96242e1662e806ffd3bd2fc1b0c # v0.0.4
    with:
      image-name: ${{ github.repository }}
      dockerhub-image-name: query-exporter
      dockerhub-username: ${{ vars.DOCKERHUB_USERNAME }}
      platforms: linux/amd64,linux/arm64
    secrets: inherit

  build-full:
    name: Build full image
    if: github.actor == github.repository_owner
    uses: albertodonato/github-workflows/.github/workflows/docker-build-publish.yaml@db4826b991f4a96242e1662e806ffd3bd2fc1b0c # v0.0.4
    needs:
      - build-base
    with:
      image-name: ${{ github.repository }}
      suffix: full
      dockerhub-image-name: query-exporter
      dockerhub-username: ${{ vars.DOCKERHUB_USERNAME }}
      platforms: linux/amd64,linux/arm64
    secrets: inherit
