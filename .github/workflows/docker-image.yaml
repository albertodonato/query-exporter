name: Docker image

on:
  push:
    branches:
      - main
      - next
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        variant:
          - base
          - full
    env:
      SUFFIX: ${{ matrix.variant != 'full' && format('-{0}', matrix.variant) || '' }}
      IS_MAIN_PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      IS_TAG: ${{ startsWith(github.ref, 'refs/tags/') }}

    steps:
      - name: Repository checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.IS_TAG == 'true'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ env.IS_TAG == 'true' && format('{0}/query-exporter', vars.DOCKERHUB_USERNAME) || '' }}
          tags: |
            type=ref,event=branch,suffix=${{ env.SUFFIX }}
            type=ref,event=pr,prefix=pr-,suffix=${{ env.SUFFIX }}
            type=ref,event=tag,suffix=${{ env.SUFFIX }}
            type=semver,pattern={{major}},suffix=${{ env.SUFFIX }},enable=${{ env.IS_TAG == 'true' }}
            type=sha,prefix=sha-,suffix=${{ env.SUFFIX }},enable=${{ env.IS_TAG == 'false' }}
            type=raw,value=latest,suffix=${{ env.SUFFIX }},enable=${{ env.IS_MAIN_PUSH == 'true' || env.IS_TAG == 'true' }}
          flavor: |
            latest=false

      - name: Build and push
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
