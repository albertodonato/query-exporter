requires = [ "tox>=4.6" ]

[env_run_base]
runner = "uv-venv-lock-runner"
package = "wheel"
dependency_groups = [ "dev", "tests" ]
commands = [ [ "pytest", { replace = "posargs", default = [ "--cov", "query_exporter/" ], extend = true } ] ]

[env.check]
dependency_groups = [ "dev", "tests", "types" ]
commands = [
  [
    "mypy",
    "integration_tests",
    "query_exporter",
    "tests",
    { replace = "posargs", default = [], extend = true }
  ]
]

[env.format]
package = "skip"
dependency_groups = [ "dev" ]
commands = [
  [ "ruff", "format", "integration_tests", "query_exporter", "tests" ],
  [ "ruff", "check", "--fix", "integration_tests", "query_exporter", "tests" ],
  [ "-", "pyproject-fmt", "pyproject.toml" ],
  [ "-", "tox-toml-fmt", "tox.toml" ],
]

[env.integration-tests]
dependency_groups = [ "integration-tests" ]
commands = [ [ "pytest", "-o", "testpaths=integration_tests", { replace = "posargs", default = [], extend = true } ] ]

[env.lint]
package = "skip"
dependency_groups = [ "dev" ]
commands = [
  [ "ruff", "check", "integration_tests", "query_exporter", "tests" ],
  [ "pyproject-fmt", "--check", "pyproject.toml" ],
  [ "tox-toml-fmt", "--check", "tox.toml" ],
]

[env.run]
package = "editable"
commands = [ [ "query-exporter", { replace = "posargs", default = [], extend = true } ] ]
